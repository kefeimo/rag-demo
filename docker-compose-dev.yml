version: '3.8'

services:
  backend:
    # Use the same image as production to avoid rebuilding
    image: rag-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend-dev
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      - LLM_PROVIDER=gpt4all
      - GPT4ALL_MODEL=mistral-7b-instruct-v0.1.Q4_0.gguf
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      
      # RAG Parameters
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - TOP_K_RESULTS=5
      - CONFIDENCE_THRESHOLD=0.65
      
      # ChromaDB Configuration
      - CHROMA_PERSIST_DIRECTORY=./data/chroma_db
      - CHROMA_COLLECTION_NAME=fastapi_docs
      
      # API Configuration
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:5174
    volumes:
      # Mount source code for hot reload
      - ./backend/app:/app/app
      - ./backend/requirements.txt:/app/requirements.txt
      # Mount data directory for persistence
      - ./data:/app/data
      # Mount documents directory
      - ./data/documents:/app/data/documents
      # Cache GPT4All models to avoid re-downloading
      - ~/.cache/gpt4all:/root/.cache/gpt4all
    # Override the default CMD with reload flag
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    # Use the same image name to share cache
    image: rag-frontend-dev:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rag-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      # Exclude node_modules (use container's version)
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: rag-network-dev
