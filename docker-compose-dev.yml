version: '3.8'

services:
  backend:
    # Use the same image as production to avoid rebuilding
    image: rag-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override only necessary settings for Docker
      - CHROMA_PERSIST_DIRECTORY=./data/chroma_db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:5174
    volumes:
      # Mount source code for hot reload
      - ./backend/app:/app/app
      - ./backend/requirements.txt:/app/requirements.txt
      - ./backend/.env:/app/.env
      # Mount data directory for persistence (at project root, shared across services)
      - ./data:/app/data
      # Mount data-pipeline raw JSON files for Visa docs ingestion
      - ./data-pipeline:/app/data-pipeline
      # Cache GPT4All models to avoid re-downloading
      - ~/.cache/gpt4all:/root/.cache/gpt4all
    # Start uvicorn, wait for health check, then auto-ingest all docs (skip if already loaded)
    command: >
      sh -c "
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload &
        until curl -sf http://localhost:8000/health > /dev/null; do echo 'Waiting for backend...'; sleep 3; done &&
        echo 'Backend ready - running auto-ingest...' &&
        echo 'Ingesting FastAPI docs...' &&
        curl -s -X POST 'http://localhost:8000/api/v1/ingest' -H 'Content-Type: application/json' -d '{\"document_path\": \"data/documents\", \"force_reingest\": false}' &&
        echo 'Ingesting Visa Chart Components docs...' &&
        curl -s -X POST 'http://localhost:8000/api/v1/ingest/visa-docs' -H 'Content-Type: application/json' -d '{\"force_reingest\": false, \"repo_docs_path\": \"/app/data-pipeline/data/raw/visa_repo_docs.json\", \"code_docs_path\": \"/app/data-pipeline/data/raw/visa_code_docs.json\", \"issue_qa_path\": \"/app/data-pipeline/data/raw/visa_issue_qa.json\"}' &&
        echo 'Auto-ingest complete' &&
        wait
      "
    restart: unless-stopped
    # GPU support (requires nvidia-container-toolkit installed)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    # Use the same image name to share cache
    image: rag-frontend-dev:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rag-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      # Exclude node_modules (use container's version)
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: rag-network-dev
